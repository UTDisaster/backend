services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: utd
      POSTGRES_PASSWORD: utdpass
      POSTGRES_DB: utd_data
    ports:
      - "5433:5432"
    volumes:
      - utd-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utd"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  utd-pgdata:
